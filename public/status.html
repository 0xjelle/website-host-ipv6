<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status · Hosting</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
  <style>
    :root{--bg:#0b0e14;--panel:#151a25;--panel2:#1b2130;--border:#242c3d;--ink:#e6e9f0;--ink2:#9aa3b5;--ink3:#626c80;
      --good:#34d399;--warn:#fbbf24;--bad:#f87171;--grad:linear-gradient(135deg,#7c6cff,#38d0ff);
      --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);
      font:15px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{max-width:760px;margin:0 auto;padding:3rem 1.2rem 4rem}
    .brand{display:flex;align-items:center;gap:.55rem;font-weight:700;font-size:1.2rem;margin-bottom:2rem}
    .hex{width:34px;height:34px;display:grid;place-items:center;border-radius:9px;background:var(--grad);color:#fff;font-size:1.2rem}
    .banner{border-radius:14px;padding:1.4rem 1.6rem;margin-bottom:1.6rem;display:flex;align-items:center;gap:1rem;
      border:1px solid var(--border);background:var(--panel)}
    .banner .big-dot{width:14px;height:14px;border-radius:50%;flex:none}
    .banner h1{font-size:1.2rem;margin:0}.banner .sub{color:var(--ink2);font-size:.85rem;margin-top:.15rem}
    .op{--c:var(--good)}.partial{--c:var(--warn)}.major{--c:var(--bad)}.none{--c:var(--ink3)}
    .banner .big-dot{background:var(--c)}.banner.op{box-shadow:inset 3px 0 0 var(--good)}
    .summary{display:flex;gap:1rem;margin-bottom:1.4rem}
    .stat{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:.9rem 1.1rem}
    .stat .n{font-size:1.7rem;font-weight:700}.stat .l{font-size:.75rem;color:var(--ink2);text-transform:uppercase;letter-spacing:.06em}
    .stat.up .n{color:var(--good)}.stat.down .n{color:var(--bad)}
    .list{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .row{display:flex;align-items:center;gap:.9rem;padding:.9rem 1.2rem;border-bottom:1px solid rgba(36,44,61,.6)}
    .row:last-child{border-bottom:none}.row .dot{width:9px;height:9px;border-radius:50%;flex:none}
    .row .dot.up{background:var(--good);box-shadow:0 0 6px var(--good)}.row .dot.down{background:var(--bad)}
    .row .dot.deg{background:var(--warn)}
    .row .name{font-weight:600}.row a{color:var(--ink);text-decoration:none}.row a:hover{color:#38d0ff}
    .row .type{font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);border:1px solid var(--border);
      border-radius:5px;padding:.05rem .35rem}
    .row .ssl{font-size:.72rem;font-weight:600;padding:.1rem .45rem;border-radius:6px;border:1px solid var(--border)}
    .ssl.secure{color:var(--good);border-color:rgba(52,211,153,.4)}
    .ssl.expiring{color:var(--warn);border-color:rgba(251,191,36,.4)}
    .ssl.none{color:var(--ink3)}.ssl.pending{color:var(--warn)}.ssl.na{display:none}
    .row .state{margin-left:auto;font-size:.82rem;font-weight:600}
    .state.up{color:var(--good)}.state.down{color:var(--bad)}.state.deg{color:var(--warn)}
    .foot{text-align:center;color:var(--ink3);font-size:.78rem;margin-top:1.6rem}
    .empty{padding:2.5rem;text-align:center;color:var(--ink3)}
    @media(prefers-color-scheme:light){:root{--bg:#f6f7fb;--panel:#fff;--panel2:#eef1f6;--border:#e2e6ee;
      --ink:#1a2030;--ink2:#5a6478;--ink3:#96a0b4}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><span class="hex">⬡</span> Hosting · Status</div>
    <div id="app"><div class="empty">Loading status…</div></div>
    <div class="foot" id="foot"></div>
  </div>
  <script>
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const LABELS = { operational: 'All systems operational', partial: 'Partial outage', major: 'Major outage', none: 'No sites yet' };
    async function load() {
      let d;
      try { d = await (await fetch('/api/status')).json(); }
      catch { document.getElementById('app').innerHTML = '<div class="empty">Status unavailable.</div>'; return; }
      const cls = d.overall === 'operational' ? 'op' : d.overall;
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="banner ${cls}"><span class="big-dot"></span>
          <div><h1>${LABELS[d.overall] || 'Status'}</h1>
            <div class="sub">${d.counts.up} of ${d.counts.total} site${d.counts.total === 1 ? '' : 's'} online</div></div></div>
        <div class="summary">
          <div class="stat up"><div class="n">${d.counts.up}</div><div class="l">Online</div></div>
          <div class="stat down"><div class="n">${d.counts.down}</div><div class="l">Offline</div></div>
          <div class="stat"><div class="n">🔒 ${d.ssl ? d.ssl.secure : 0}</div><div class="l">HTTPS secured</div></div>
          <div class="stat"><div class="n">${d.counts.total}</div><div class="l">Total</div></div>
        </div>
        ${d.ssl && d.ssl.expiring ? `<div class="banner partial" style="padding:.8rem 1.2rem;margin-bottom:1.2rem"><span class="big-dot"></span><div><b>${d.ssl.expiring}</b> certificate${d.ssl.expiring === 1 ? '' : 's'} expiring soon</div></div>` : ''}
        ${d.sites.length ? `<div class="list">${d.sites.map(s => {
          const st = s.degraded ? 'deg' : (s.online ? 'up' : 'down');
          const label = s.degraded ? 'Deploying' : (s.online ? 'Operational' : 'Down');
          const ssl = s.ssl || { state: 'na' };
          const sslLabel = { secure: '🔒 SSL', expiring: `🔒 ${ssl.daysLeft}d left`, pending: '🔒 pending', none: '🔓 no SSL', na: '' }[ssl.state] || '';
          return `<div class="row"><span class="dot ${st}"></span>
            <span class="name"><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a></span>
            <span class="type">${esc(s.type)}</span>
            ${sslLabel ? `<span class="ssl ${ssl.state}" title="${ssl.not_after ? 'expires ' + new Date(ssl.not_after).toLocaleDateString() : ''}">${sslLabel}</span>` : ''}
            <span class="state ${st}">${label}${s.online && s.ms ? ` · ${s.ms}ms` : ''}</span></div>`;
        }).join('')}</div>` : '<div class="list"><div class="empty">No sites are being hosted yet.</div></div>'}`;
      document.getElementById('foot').textContent = 'Updated ' + new Date(d.generated).toLocaleTimeString() + ' · refreshes every 30s';
    }
    load(); setInterval(load, 30000);
  </script>
</body>
</html>
